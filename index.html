<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Terminal</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="top-bar">
      <div class="dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <div class="title" id="topTitle">Terminal Practice — zsh</div>
      <div class="top-bar-controls">
        <div class="lang-btn active" data-lang="zh" onclick="switchLang('zh')">中</div>
        <div class="lang-btn"        data-lang="en" onclick="switchLang('en')">EN</div>
        <div class="lang-btn"        data-lang="ja" onclick="switchLang('ja')">日</div>
        <div class="task-mode-btn" id="taskModeBtn" onclick="toggleTaskMode()">Tasks</div>
        <div class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</div>
        <div class="mode-badge" id="modeBadge">NORMAL</div>
      </div>
    </div>
    <div class="task-bar" id="taskBar" style="display:none">
      <div class="task-bar-header" onclick="toggleTaskPanel()">
        <span class="task-bar-label" id="taskBarLabel"></span>
        <span class="task-bar-title" id="taskBarTitle"></span>
        <div class="task-bar-controls">
          <span class="task-nav-btn" id="taskBackBtn" onclick="backToThemeSelector(); event.stopPropagation();" style="display:none">← Themes</span>
          <span class="task-expand-btn" id="taskExpandBtn">▼</span>
        </div>
      </div>
      <div class="task-bar-body" id="taskBarBody" style="display:none"></div>
    </div>
    <div class="terminal-wrap">
      <div id="terminal"></div>
      <div class="hint-container" id="hintContainer"></div>
    </div>
    <div class="keyboard-section" id="keyboard">
      <!-- Tips panel: absolutely covers the keyboard area only -->
      <div class="tips-panel" id="tipsPanel">
        <div class="tips-header">
          <span class="tips-title" id="tipsPanelTitle"></span>
          <button class="tips-close" onclick="toggleTips()">×</button>
        </div>
        <div class="tips-body" id="tipsBody"></div>
      </div>
    </div>
  </div>

  <!-- Tips button: fixed, always visible -->
  <button class="tips-btn" id="tipsBtn" onclick="toggleTips()">?</button>
  <!-- Load order matters: data → translations → tasks → app logic -->
  <script src="vfs/files.js"></script>
  <script src="filesystem.js"></script>
  <script src="lang/zh.js"></script>
  <script src="lang/en.js"></script>
  <script src="lang/ja.js"></script>
  <script src="task-themes.js"></script>
  <script src="app.js"></script>
</body>
</html>
